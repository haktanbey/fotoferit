<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bir Ai 2026 Edition</title>
  <style>
    body {
      background: linear-gradient(135deg, #1a0033, #000d1a);
      color: #e0e0ff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 {
      font-size: 3rem;
      margin: 20px 0;
      background: linear-gradient(90deg, #ff00cc, #00ffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 20px rgba(0,255,255,0.5);
    }
    .container {
      background: rgba(20, 20, 60, 0.6);
      backdrop-filter: blur(10px);
      border: 2px solid #00ffff44;
      border-radius: 20px;
      padding: 30px;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 10px 40px rgba(0,255,255,0.2);
    }
    textarea, input {
      width: 100%;
      padding: 14px;
      margin: 12px 0;
      border-radius: 12px;
      border: 2px solid #00ffff44;
      background: rgba(255,255,255,0.05);
      color: white;
      font-size: 1.1rem;
      resize: none;
    }
    textarea:focus, input:focus {
      outline: none;
      border-color: #00ffff;
      box-shadow: 0 0 15px #00ffff66;
    }
    button {
      background: linear-gradient(45deg, #ff00cc, #00ffff);
      color: black;
      border: none;
      padding: 16px 32px;
      font-size: 1.3rem;
      font-weight: bold;
      border-radius: 12px;
      cursor: pointer;
      margin: 15px auto;
      display: block;
      transition: all 0.3s;
    }
    button:hover {
      transform: scale(1.08);
      box-shadow: 0 0 30px #00ffffaa;
    }
    #answer {
      margin-top: 30px;
      padding: 20px;
      background: rgba(0,0,0,0.4);
      border-radius: 16px;
      min-height: 120px;
      font-size: 1.2rem;
      line-height: 1.5;
      white-space: pre-wrap;
      border-left: 5px solid #ff00cc;
    }
    .emoji {
      font-size: 2.5rem;
      margin: 10px 0;
      display: block;
      text-align: center;
    }
  </style>
</head>
<body>

<h1>KAÇIK FALCI AI</h1>
<div class="emoji">🪬👽🔮</div>

<div class="container">
  <input type="text" id="name" placeholder="Adın ne lan? (isteğe bağlı)" />

  <textarea id="question" rows="3" placeholder="Sor bakalım kaderine ne yazmışım... (aşk, para, iş, ex'in döner mi vs.)"></textarea>

  <button onclick="falBak()">Falı Aç →</button>

  <div id="answer"></div>
</div>

<script>
// Kaçık Falcı'nın deli kişiliği
const sacmaYuzdeler = [0, 20, 35, 50, 65, 80]; // % kaç ihtimalle saçmalasın
const sacmaMod = sacmaYuzdeler[Math.floor(Math.random() * sacmaYuzdeler.length)];

const olumluSifatlar = ["epik", "manyak", "efsane", "patlayıcı", "kral", "kraliçe", "uzay boşluğunda parlayan yıldız"];
const olumsuzSifatlar = ["faciası", "rezalet", "epik fail", "utanç kaynağı", "lanetli", "zombi modu"];
const emojiSetleri = ["🔥🚀", "💀😂", "🤑👽", "😭🤡", "🌌🪐", "⚡🐸"];

function rastgeleSec(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function falBak() {
  const isim = document.getElementById("name").value.trim() || "kanka";
  const soru = document.getElementById("question").value.trim().toLowerCase();
  const cevapAlani = document.getElementById("answer");

  if (!soru) {
    cevapAlani.innerHTML = "Lan bi soru sor da fal bakayım, boş boş bakmıyorum burda ";
    return;
  }

  let cevap = "";
  const trollemeIhtimali = Math.random() * 100;

  // Soruya göre biraz akıllıca davranmaya çalışalım (çok basit regex ile)
  if (soru.includes("aşk") || soru.includes("sevgili") || soru.includes("ex") || soru.includes("kız") || soru.includes("erkek")) {
    if (trollemeIhtimali < sacmaMod) {
      cevap = `${isim.toUpperCase()}, aşk hayatın tam bir ${rastgeleSec(olumsuzSifatlar)}. Ex'in dönecek ama sen yine aynı hatayı yapacaksın 😂`;
    } else {
      cevap = `Aşk konusunda ${rastgeleSec(olumluSifatlar)} olacaksın ${isim}! Yeni biri geliyor, ama sakın hemen "seni seviyorum" deme, rezil olursun 🫶`;
    }
  }
  else if (soru.includes("para") || soru.includes("para") || soru.includes("zengin") || soru.includes("iş")) {
    if (trollemeIhtimali < sacmaMod) {
      cevap = `Para mı? ${isim} senin cüzdanın şu an ${rastgeleSec(olumsuzSifatlar)}. Kripto alacaksın, sonra ağlayacaksın 💀`;
    } else {
      cevap = `Para akışı ${rastgeleSec(olumluSifatlar)} olacak! Ama har vurup harman savurma, yoksa yine sıfır çekersin 🤑🚀`;
    }
  }
  else if (soru.includes("gelecek") || soru.includes("olacak") || soru.includes("ne olacak")) {
    cevap = `Geleceğin ${rastgeleSec(emojiSetleri)} şeklinde gözüküyor. ${isim}, büyük ihtimalle ya çok zengin olucan ya da çok pişman... %50/%50 👽`;
  }
  else {
    // Genel saçma cevaplar
    const genelCevaplar = [
      `${isim}, sorduğun şey çok derin... Ama bence bırak, git bi çay koy, her şey hallolur ☕`,
      `Kanka o iş ${rastgeleSec(olumluSifatlar)} olacak ama sen yine erteleyeceksin, klasik senlik 😂`,
      `Falımda ${rastgeleSec(emojiSetleri)} çıktı. Yorumu sana bırakıyorum...`,
      `Bana ${isim} diye hitap etme artık, ben AI’yim, saygı duy lan 😤`,
      `Cevap: Hayır. Ama sen yine de deneyeceksin, çünkü inatçısın 🐸`
    ];
    cevap = rastgeleSec(genelCevaplar);
  }

  // Son dokunuş: biraz daha kişiselleştir
  if (isim.length > 1) {
    cevap = cevap.replace("sen", isim);
  }

  cevapAlani.innerHTML = cevap;
}
</script>

</body>
</html>
